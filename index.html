{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кube :P</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #15151f 0%, #06060a 65%, #000 100%);
            color: white;
            overflow: hidden;
            font-family: Trebuchet MS, Verdana, Arial, sans-serif;
        }

        .main {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        pre {
            margin: 0;
            color: #00ff88;
            font-size: 1.15vw;
            line-height: 1.05vw;
            text-shadow: 0 0 9px #00ff88;
            user-select: none;
        }

        .text {
            position: absolute;
            top: 48px;
            width: 100%;
            text-align: center;
            z-index: 2;
        }

        .text h1 {
            margin: 0;
            font-size: 44px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 8px #00ff88, 0 0 25px #000;
        }

        .text p {
            margin: 16px 0 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #d8fff0;
            text-shadow: 0 0 10px #00ff88, 0 0 18px #000;
        }

        .links {
            margin-top: 20px;
        }

        .links a {
            display: inline-block;
            margin: 0 9px;
            padding: 14px 28px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.32);
            box-shadow: 0 0 14px rgba(0, 255, 136, 0.25);
            backdrop-filter: blur(4px);
            transition: 0.15s;
        }

        .links a:hover {
            transform: scale(1.06);
            background: rgba(0, 255, 136, 0.22);
        }

        button {
            display: block;
            margin: 18px auto 0;
            padding: 14px 28px;
            border: 0;
            border-radius: 14px;
            background: #2563eb;
            color: white;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 14px rgba(37, 99, 235, 0.6);
            transition: 0.15s;
        }

        button:hover {
            transform: scale(1.06);
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="text">
            <h1>Это мой первый сайт, добро пожаловать</h1>
            <p>Соц сети</p>

            <div class="links">
                <a href="#">Дискорд</a>
                <a href="#">Телеграм</a>
            </div>

            <button id="btn">Поменять цвет</button>
        </div> <!--Сделать норм кнопку, починить цвета-->

        <pre id="cube">{{ frames.0 }}</pre>
    </div>

    {{ frames|json_script:"frames" }}

    <script>
        let cube = document.getElementById('cube')
        let btn = document.getElementById('btn')
        let frames = JSON.parse(document.getElementById('frames').textContent)

        let colors = ['#00ff88', '#00ccff', '#ff44aa', '#ffaa00', '#ffffff']
        let color = 0
        let frame = 0

        btn.onclick = function () {
            color++

            if (color >= colors.length) {
                color = 0
            }

            cube.style.color = colors[color]
            cube.style.textShadow = '0 0 8px ' + colors[color]
            btn.style.background = colors[color]
        }

        setInterval(function () {
            cube.textContent = frames[frame]
            frame++

            if (frame >= frames.length) {
                frame = 0
            }
        }, 80)
    </script>
</body>
</html>
